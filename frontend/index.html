<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <title>Course Management</title>
</head>

<body>

<h1>Course Management System</h1>

<label>Enter your nickname:</label> <input type="text" id="nickname">

<button onclick="welcome()">Submit</button>

<h2 id="result"></h2>

<script>
function welcome() {
    const name = document.getElementById("nickname").value;
    document.getElementById("result").innerText =
        "Welcome to Course Management " + name;
}
</script>

</body>
</html>
